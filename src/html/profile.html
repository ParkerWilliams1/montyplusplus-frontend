<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MontyPlusPlus — Profile</title>
  <link rel="stylesheet" href="./main.css">
  <style>
    .profile-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .profile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .profile-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(229,187,0,0.1);
      border: 2px solid rgba(229,187,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--accent);
      flex-shrink: 0;
    }

    .profile-name-block {
      flex: 1;
    }

    .profile-name {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .profile-meta {
      font-size: 0.78rem;
      color: var(--text-2);
      font-family: var(--mono);
      margin-top: 0.2rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
    }

    .stat-card {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-value.accent { color: var(--accent); }
    .stat-value.green  { color: var(--green); }
    .stat-value.red    { color: var(--red); }

    .record-bar-wrap {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    .record-bar-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 0.75rem;
    }

    .record-bar {
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--bg-3);
      display: flex;
    }

    .record-bar-wins {
      background: var(--green);
      transition: width 0.5s ease;
    }

    .record-bar-losses {
      background: var(--red);
      transition: width 0.5s ease;
    }

    .record-bar-legend {
      display: flex;
      gap: 1.25rem;
      margin-top: 0.625rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-2);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .panel {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.02em;
    }

    .history-row {
      display: grid;
      grid-template-columns: 80px 1fr 80px 100px;
      align-items: center;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      gap: 0.75rem;
      font-size: 0.82rem;
    }

    .history-row:last-child { border-bottom: none; }
    .history-row:hover { background: var(--bg-2); }

    .history-outcome {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 700;
    }

    .history-outcome.win   { color: var(--green); }
    .history-outcome.loss  { color: var(--red); }
    .history-outcome.draw  { color: var(--text-2); }

    .history-problem {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-mode {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .history-date {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-3);
      text-align: right;
    }

    .edit-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1.25rem;
    }

    .edit-row {
      display: flex;
      gap: 0.75rem;
    }

    .edit-row input { flex: 1; }

    .skeleton {
      background: var(--bg-2);
      border-radius: 4px;
      animation: shimmer 1.2s ease infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/app.html" class="nav-logo">Monty<span>++</span></a>
    <div class="nav-right">
      <a href="/leaderboard.html" class="btn btn-ghost btn-sm">Leaderboard</a>
      <a href="/app.html" class="btn btn-ghost btn-sm">Play</a>
      <button id="logout-btn" class="btn btn-ghost btn-sm">Sign out</button>
    </div>
  </nav>

  <div class="profile-wrap">
    <div class="profile-header">
      <div class="profile-avatar" id="profile-avatar">—</div>
      <div class="profile-name-block">
        <div class="profile-name" id="profile-name">Loading...</div>
        <div class="profile-meta" id="profile-meta"></div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Rating</div>
        <div class="stat-value accent" id="stat-rating">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Rank</div>
        <div class="stat-value" id="stat-rank">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Wins</div>
        <div class="stat-value green" id="stat-wins">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Losses</div>
        <div class="stat-value red" id="stat-losses">—</div>
      </div>
    </div>

    <div class="record-bar-wrap">
      <div class="record-bar-label">Win / Loss record</div>
      <div class="record-bar">
        <div class="record-bar-wins" id="record-wins-bar" style="width:0%"></div>
        <div class="record-bar-losses" id="record-losses-bar" style="width:100%"></div>
      </div>
      <div class="record-bar-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--green)"></div>
          <span id="legend-wins">0 wins</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--red)"></div>
          <span id="legend-losses">0 losses</span>
        </div>
        <div class="legend-item" id="legend-winrate-wrap">
          <span id="legend-winrate"></span>
        </div>
      </div>
    </div>

    <div class="panel" id="edit-panel"></div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Match history</span>
      </div>
      <div id="history-rows">
        <div style="padding:2rem;text-align:center;color:var(--text-3);font-size:0.875rem;">Loading...</div>
      </div>
    </div>
  </div>

  <script src="./profile.bundle.js"></script>
</body>
</html>
