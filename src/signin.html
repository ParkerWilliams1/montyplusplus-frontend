<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - MontyPlusPlus</title>
    <link rel="stylesheet" href="signin.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>MontyPlusPlus</h1>
            <p>The Ultimate Competitive Coding Challenge</p>
        </header>
        <main>
            <div class="form-container">
                <h2>Sign In / Sign Up</h2>
                <form id="signin-form">
                    <input type="text" id="name" placeholder="Name (required for Sign Up)">
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit">Sign In</button>
                    <button type="button" id="signup-btn">Sign Up</button>
                    <button type="button" id="logout-btn">Return to Home</button>
                </form>
            </div>
        </main>
        <footer>
            <p>&copy; 2026 MontyPlusPlus</p>
        </footer>
    </div>
    <script src="signin.js"></script>
</body>
</html>
